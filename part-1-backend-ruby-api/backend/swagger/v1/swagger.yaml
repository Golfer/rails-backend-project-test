openapi: 3.0.3
info:
  title: Backend API
  version: v1
  description: API for companies, onboarding, products, sales, and sync status.

paths:
  /api/v1/companies:
    get:
      summary: List companies
      tags: [Companies]
      responses:
        '200':
          description: List of companies
    post:
      summary: Create company
      tags: [Companies]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CompanyInput'
      responses:
        '201':
          description: Created
        '422':
          description: Validation error

  /api/v1/companies/{id}:
    get:
      summary: Get company
      tags: [Companies]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200': { description: OK }
        '404': { description: Not found }
    put:
      summary: Update company
      tags: [Companies]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CompanyInput'
      responses:
        '200': { description: OK }
        '422': { description: Validation error }
    delete:
      summary: Delete company
      tags: [Companies]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        '204': { description: No content }
        '404': { description: Not found }

  /api/v1/onboarding_steps:
