      tags: [Users]
      parameters:
        - name: company_id
          in: query
          schema: { type: string, format: uuid }
      responses:
        '200': { description: List of users }
    post:
      summary: Create user
      tags: [Users]
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserInput'
      responses:
        '201': { description: Created }
