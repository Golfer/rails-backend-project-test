components:
  schemas:
    CompanyInput:
      type: object
      required: [name]
      properties:
        name: { type: string }

    OnboardingStepInput:
      type: object
      properties:
        title: { type: string }
        slug: { type: string }
        sort_order: { type: integer }
        category: { type: string }
        is_active: { type: boolean }
        is_mandatory: { type: boolean }
        dependency_step_id: { type: integer, nullable: true }

    OnboardingProcessInput:
      type: object
      properties:
        company_id: { type: string, format: uuid }
        current_step_id: { type: integer, nullable: true }

    OnboardingStepSubmissionInput:
      type: object
      properties:
        company_id: { type: string, format: uuid }
        step_id: { type: integer }
        status: { type: string, enum: [started, completed, skipped] }
        values: { type: object }
        completed_at: { type: string, format: date-time, nullable: true }

    VendorInput:
      type: object
      required: [company_id, name]
      properties:
        company_id: { type: string, format: uuid }
        name: { type: string }
        contact_info: { type: object }

    WarehouseInput:
      type: object
      required: [company_id, name]
      properties:
        company_id: { type: string, format: uuid }
        name: { type: string }
        address: { type: string }

    ProductInput:
      type: object
      required: [sku_id, company_id, vendor_id, name]
      properties:
        sku_id: { type: string }
        company_id: { type: string, format: uuid }
        vendor_id: { type: string, format: uuid }
        name: { type: string }
        lead_time_days: { type: integer, nullable: true }
        days_of_stock: { type: integer, nullable: true }
        forecasting_days: { type: integer, nullable: true }

    SalesHistoryInput:
      type: object
      required: [product_sku, sale_date, quantity]
      properties:
        product_sku: { type: string }
        sale_date: { type: string, format: date }
        quantity: { type: integer }

    SyncStatusInput:
      type: object
      required: [company_id, entity_type]
      properties:
        company_id: { type: string, format: uuid }
        entity_type: { type: string }
        total_count: { type: integer }
        synced_count: { type: integer }
        is_finished: { type: boolean }

    UserInput:
      type: object
      required: [company_id, email, role]
      properties:
        company_id: { type: string, format: uuid }
        email: { type: string, format: email }
        role: { type: string, enum: [admin, planner] }
